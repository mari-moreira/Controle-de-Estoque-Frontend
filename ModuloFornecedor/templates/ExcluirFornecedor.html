<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Excluir Fornecedor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<!-- MENU -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

        <a href="/index.html" class="navbar-brand">
            Distribuidora Rocha
        </a>

        <div>
            <a href="CadastrarFornecedor.html" class="btn btn-outline-light btn-sm">Cadastrar</a>
            <a href="PesquisarFornecedor.html" class="btn btn-outline-light btn-sm">Pesquisar</a>
            <a href="EditarFornecedor.html" class="btn btn-outline-light btn-sm">Editar</a>
            <a href="ExcluirFornecedor.html" class="btn btn-outline-light btn-sm">Excluir</a>
        </div>

    </div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-5 flex-grow-1">
    <div class="card shadow p-4">

        <h4 class="mb-3">Excluir Fornecedor</h4>

        <!-- Buscar -->
        <div class="input-group mb-3">
            <input type="number" id="id" class="form-control" placeholder="Digite o ID">
            <button class="btn btn-primary" onclick="buscar()">Buscar</button>
        </div>

        <!-- Info -->
        <div id="info" class="mb-3"></div>

        <!-- Botão excluir -->
        <button onclick="excluir()" class="btn btn-danger w-100">
            Excluir
        </button>

        <!-- Mensagem -->
        <div id="msg" class="mt-3"></div>

    </div>
</div>

<!-- RODAPÉ -->
<footer class="bg-dark text-light text-center mt-auto">
    <div class="container py-3">
        <small>© 2026 Distribuidora Rocha</small>
    </div>
</footer>

<script src="../static/ExcluirFornecedor.js"></script>

</body>
</html>
