<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Fornecedor</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<!-- MENU -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">

       <a href="../../ModuloCliente/templates/index.html" class="navbar-brand">
    Distribuidora Rocha
</a>
        <div>
            <a href="CadastrarFornecedor.html" class="btn btn-outline-light btn-sm">Cadastrar</a>
            <a href="PesquisarFornecedor.html" class="btn btn-outline-light btn-sm">Pesquisar</a>
            <a href="EditarFornecedor.html" class="btn btn-outline-light btn-sm">Editar</a>
            <a href="ExcluirFornecedor.html" class="btn btn-outline-light btn-sm">Excluir</a>
        </div>

    </div>
</nav>

<!-- CONTEÚDO -->
<div class="container mt-5 flex-grow-1">
    <div class="card shadow p-4">

        <h4 class="mb-3">Editar Fornecedor</h4>

        <!-- Buscar -->
        <div class="input-group mb-3">
            <input type="number" id="idBusca" class="form-control" placeholder="Digite o ID">
            <button class="btn btn-primary" onclick="buscar()">Buscar</button>
        </div>

        <!-- Formulário escondido -->
        <div id="formContainer" style="display: none;">

            <form id="form">

                <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
                <input type="text" id="cnpj" class="form-control mb-2" placeholder="CNPJ">
                <input type="text" id="telefone" class="form-control mb-2" placeholder="Telefone">
                <input type="text" id="endereco" class="form-control mb-2" placeholder="Endereço">
                <input type="text" id="cidade" class="form-control mb-2" placeholder="Cidade">
                <input type="text" id="produtoFornecidoA" class="form-control mb-2" placeholder="Produto A">
                <input type="text" id="produtoFornecidoB" class="form-control mb-3" placeholder="Produto B">

                <button type="submit" class="btn btn-warning w-100">
                    Salvar alterações
                </button>

            </form>

        </div>

        <div id="msg" class="mt-3"></div>

    </div>
</div>

<!-- RODAPÉ -->
<footer class="bg-dark text-light text-center mt-auto">
    <div class="container py-3">
        <small>© 2026 Distribuidora Rocha</small>
    </div>
</footer>

<script src="../static/EditarFornecedor.js"></script>

</body>
</html>
