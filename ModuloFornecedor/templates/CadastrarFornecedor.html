<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Fornecedor</title>
</head>
<body>

    <h2>Cadastrar Fornecedor</h2>

    <form id="formFornecedor">
        <label>Nome:</label><br>
        <input type="text" id="nome" required><br><br>

        <label>CNPJ:</label><br>
        <input type="text" id="cnpj" required><br><br>

        <label>Telefone:</label><br>
        <input type="text" id="telefone" required><br><br>

        <label>Endereco:</label><br>
        <input type="text" id="endereco" required><br><br>

        <label>Cidade:</label><br>
        <input type="text" id="cidade" required><br><br>

        <label>ProdutoFornecidoA:</label><br>
        <input type="text" id="produtoFornecidoA" required><br><br>

        <label>ProdutoFornecidoB:</label><br>
        <input type="text" id="produtoFornecidoB" required><br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <p id="mensagem"></p>

    <script src="CadastrarFornecedor.js"></script>

</body>
</html>
