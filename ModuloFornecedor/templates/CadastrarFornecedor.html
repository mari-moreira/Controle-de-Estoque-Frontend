<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Fornecedor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a href="../../ModuloCliente/templates/index.html" class="navbar-brand fw-bold">Distribuidora Rocha</a>
        <div>
            <a href="PesquisarFornecedor.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-search me-1"></i>Fornecedores
            </a>
            <a href="CadastrarFornecedor.html" class="btn btn-light btn-sm ms-1">
                <i class="bi bi-building-add me-1"></i>Novo Fornecedor
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4" style="max-width: 600px; margin: auto;">

        <h3 class="text-center mb-1">
            <i class="bi bi-building-add text-success me-2"></i>Cadastrar Fornecedor
        </h3>
        <p class="text-center text-muted mb-4">Preencha os dados para registrar um novo fornecedor</p>

        <form id="formFornecedor">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nome</label>
                <input type="text" id="nome" class="form-control" required placeholder="Razão social ou nome fantasia">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">CNPJ</label>
                <input type="text" id="cnpj" class="form-control" required placeholder="Somente números (ex: 12345678000199)">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Telefone</label>
                    <input type="text" id="telefone" class="form-control" required placeholder="Somente números">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Cidade</label>
                    <input type="text" id="cidade" class="form-control" required placeholder="Cidade">
                </div>
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Endereço</label>
                <input type="text" id="endereco" class="form-control" required placeholder="Rua, número, bairro...">
            </div>

            <div class="row">
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Produto Fornecido A</label>
                    <input type="text" id="produtoFornecidoA" class="form-control" required placeholder="Produto principal">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label fw-semibold">Produto Fornecido B <span class="text-muted small">(opcional)</span></label>
                    <input type="text" id="produtoFornecidoB" class="form-control" placeholder="Produto secundário">
                </div>
            </div>

            <div class="d-flex gap-2">
                <a href="PesquisarFornecedor.html" class="btn btn-outline-secondary w-50">
                    <i class="bi bi-arrow-left me-1"></i>Voltar
                </a>
                <button type="submit" class="btn btn-success w-50">
                    <i class="bi bi-check-circle me-1"></i>Cadastrar
                </button>
            </div>

        </form>

        <div id="mensagem" class="mt-3"></div>

    </div>
</div>

<footer class="bg-dark text-light text-center mt-auto">
    <div class="container py-3">
        <small>© 2026 Distribuidora Rocha</small>
    </div>
</footer>

<script src="../static/CadastrarFornecedor.js"></script>
</body>
</html>
