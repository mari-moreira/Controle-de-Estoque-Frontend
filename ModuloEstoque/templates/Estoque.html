<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gestão de Estoque</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body { background-color: #f4f6f9; }
        .navbar-brand { font-weight: bold; letter-spacing: 1px; }
        .nav-tabs .nav-link { color: #495057; font-weight: 500; }
        .nav-tabs .nav-link.active { font-weight: bold; color: #0d6efd; border-bottom: 3px solid #0d6efd; }
        .card { border: none; box-shadow: 0 0.125rem 0.25rem rgba(0,0,0,0.075); border-radius: 8px; }
        .tab-content { padding-top: 20px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <a class="navbar-brand" href="#"><i class="bi bi-box-seam"></i> Distribuidora ERP</a>
    </div>
</nav>

<div class="container">
    <h2 class="mb-4">Módulo de Estoque</h2>

    <ul class="nav nav-tabs" id="estoqueTabs" role="tablist">
        <li class="nav-item" role="presentation">
            <button class="nav-link active" id="pesquisa-tab" data-bs-toggle="tab" data-bs-target="#pesquisa-pane" type="button" role="tab">
                <i class="bi bi-search"></i> Consultar Estoque
            </button>
        </li>
        <li class="nav-item" role="presentation">
            <button class="nav-link" id="cadastro-tab" data-bs-toggle="tab" data-bs-target="#cadastro-pane" type="button" role="tab">
                <i class="bi bi-plus-circle"></i> Cadastrar Produto
            </button>
        </li>
    </ul>

    <div class="tab-content" id="estoqueTabsContent">
        
        <div class="tab-pane fade show active" id="pesquisa-pane" role="tabpanel">
            <div class="card">
                <div class="card-header bg-white d-flex justify-content-between align-items-center py-3">
                    <h5 class="mb-0">Lista de Produtos</h5>
                    <div class="input-group w-50">
                        <span class="input-group-text bg-light"><i class="bi bi-search"></i></span>
                        <input type="text" id="campoPesquisa" class="form-control" placeholder="Pesquisar por código ou nome...">
                    </div>
                </div>
                <div class="card-body p-0 table-responsive">
                    <table class="table table-hover align-middle mb-0">
                        <thead class="table-light">
                            <tr>
                                <th class="ps-3">Código</th>
                                <th>Produto</th>
                                <th>Quantidade</th>
                                <th class="text-end pe-3">Ações</th>
                            </tr>
                        </thead>
                        <tbody id="tabelaEstoque">
                            </tbody>
                    </table>
                </div>
            </div>
        </div>

        <div class="tab-pane fade" id="cadastro-pane" role="tabpanel">
            <div class="card">
                <div class="card-header bg-white py-3">
                    <h5 class="mb-0" id="formTitle">Novo Cadastro</h5>
                </div>
                <div class="card-body">
                    <form id="estoqueForm">
                        <div class="row g-3">
                            <div class="col-md-3">
                                <label for="codigo" class="form-label fw-bold">Código (SKU)</label>
                                <input type="text" class="form-control" id="codigo" placeholder="Ex: PROD-001" required>
                            </div>
                            <div class="col-md-6">
                                <label for="nome" class="form-label fw-bold">Nome do Produto</label>
                                <input type="text" class="form-control" id="nome" placeholder="Ex: Teclado Mecânico" required>
                            </div>
                            <div class="col-md-3">
                                <label for="quantidade" class="form-label fw-bold">Quantidade</label>
                                <input type="number" class="form-control" id="quantidade" min="0" value="0" required>
                            </div>
                        </div>
                        <div class="row mt-4">
                            <div class="col-12 d-flex justify-content-end gap-2">
                                <button type="button" class="btn btn-secondary d-none" id="btnCancelar">
                                    <i class="bi bi-x-circle"></i> Cancelar Edição
                                </button>
                                <button type="submit" class="btn btn-primary" id="btnSalvar">
                                    <i class="bi bi-save"></i> Salvar Produto
                                </button>
                            </div>
                        </div>
                    </form>
                </div>
            </div>
        </div>

    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="estoque.js"></script>
</body>
</html>
