<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container">
        <span class="navbar-brand">Distribuidora ERP</span>
        <div class="navbar-nav">
            <a class="nav-link active" href="cadastro.html">Cadastrar</a>
            <a class="nav-link" href="pesquisa.html">Pesquisar Estoque</a>
        </div>
    </div>
</nav>

<div class="container">
    <div class="card shadow-sm max-w-md mx-auto" style="max-width: 600px;">
        <div class="card-header bg-white">
            <h5 class="mb-0">Novo Cadastro</h5>
        </div>
        <div class="card-body">
            <div id="mensagem"></div>
            
            <form id="formCadastro">
                <div class="mb-3">
                    <label for="codigo" class="form-label fw-bold">Código (SKU)</label>
                    <input type="text" class="form-control" id="codigo">
                </div>
                <div class="mb-3">
                    <label for="nome" class="form-label fw-bold">Nome do Produto</label>
                    <input type="text" class="form-control" id="nome">
                </div>
                <div class="mb-4">
                    <label for="quantidade" class="form-label fw-bold">Quantidade</label>
                    <input type="number" class="form-control" id="quantidade" min="0">
                </div>
                <button type="submit" class="btn btn-primary w-100">Salvar Produto</button>
            </form>
        </div>
    </div>
</div>

<script src="cadastro.js"></script>
</body>
</html>
