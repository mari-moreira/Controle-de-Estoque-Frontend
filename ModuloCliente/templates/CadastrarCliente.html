<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a href="index.html" class="navbar-brand fw-bold">Distribuidora Rocha</a>
        <div>
            <a href="PesquisarCliente.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-search me-1"></i>Clientes
            </a>
            <a href="CadastrarCliente.html" class="btn btn-light btn-sm ms-1">
                <i class="bi bi-person-plus me-1"></i>Novo Cliente
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4" style="max-width: 550px; margin: auto;">

        <h3 class="text-center mb-1">
            <i class="bi bi-person-plus text-primary me-2"></i>Cadastrar Cliente
        </h3>
        <p class="text-center text-muted mb-4">Preencha os dados para registrar um novo cliente</p>

        <form id="formCliente">

            <div class="mb-3">
                <label class="form-label fw-semibold">Nome</label>
                <input type="text" id="nome" class="form-control" required placeholder="Nome completo">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">CPF</label>
                <input type="text" id="cpf" class="form-control" required placeholder="Somente números (ex: 12345678900)">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Telefone</label>
                <input type="text" id="telefone" class="form-control" required placeholder="Somente números (ex: 11999999999)">
            </div>

            <div class="mb-3">
                <label class="form-label fw-semibold">Endereço</label>
                <input type="text" id="endereco" class="form-control" required placeholder="Rua, número, bairro...">
            </div>

            <div class="d-flex gap-2">
                <a href="PesquisarCliente.html" class="btn btn-outline-secondary w-50">
                    <i class="bi bi-arrow-left me-1"></i>Voltar
                </a>
                <button type="submit" class="btn btn-primary w-50">
                    <i class="bi bi-check-circle me-1"></i>Cadastrar
                </button>
            </div>

        </form>

        <div id="mensagem" class="mt-3"></div>

    </div>
</div>

<footer class="bg-dark text-light text-center mt-auto">
    <div class="container py-3">
        <small>© 2026 Distribuidora Rocha</small>
    </div>
</footer>

<script src="../static/CadastrarCliente.js"></script>
</body>
</html>
