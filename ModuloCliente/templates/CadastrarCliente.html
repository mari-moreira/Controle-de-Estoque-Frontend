<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Cliente</title>
</head>
<body>

    <h2>Cadastrar CLiente</h2>

    <form id="formCliente">
        <label>Nome:</label><br>
        <input type="text" id="nome" required><br><br>

        <label>CPF:</label><br>
        <input type="text" id="cpf" required><br><br>

        <label>Telefone:</label><br>
        <input type="text" id="telefone" required><br><br>

        <label>Endereco:</label><br>
        <input type="text" id="endereco" required><br><br>

        <button type="submit">Cadastrar</button>
    </form>

    <p id="mensagem"></p>

    <script src="CadastrarCliente.html"></script>

</body>
</html>
