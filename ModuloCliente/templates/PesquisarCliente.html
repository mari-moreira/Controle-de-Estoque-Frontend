<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Clientes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">

<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
        <a href="index.html" class="navbar-brand fw-bold">Distribuidora Rocha</a>
        <div>
            <a href="PesquisarCliente.html" class="btn btn-outline-light btn-sm">
                <i class="bi bi-search me-1"></i>Clientes
            </a>
            <a href="CadastrarCliente.html" class="btn btn-light btn-sm ms-1">
                <i class="bi bi-person-plus me-1"></i>Novo Cliente
            </a>
        </div>
    </div>
</nav>

<div class="container mt-5">
    <div class="card shadow p-4">

        <div class="d-flex justify-content-between align-items-center mb-4">
            <h3 class="mb-0">
                <i class="bi bi-people text-primary me-2"></i>Clientes
            </h3>
            <a href="CadastrarCliente.html" class="btn btn-primary btn-sm">
                <i class="bi bi-person-plus me-1"></i>Novo Cliente
            </a>
        </div>

        <!-- Busca por CPF -->
        <div class="input-group mb-4">
            <span class="input-group-text"><i class="bi bi-search"></i></span>
            <input type="text" id="campoBusca" class="form-control" placeholder="Buscar por CPF (somente números)...">
            <button class="btn btn-outline-secondary" id="btnLimpar" onclick="carregarTodos()">
                <i class="bi bi-x-circle"></i> Limpar
            </button>
        </div>

        <!-- Tabela de resultados -->
        <div id="mensagem" class="mb-3"></div>

        <div class="table-responsive">
            <table class="table table-hover align-middle">
                <thead class="table-dark">
                    <tr>
                        <th>Nome</th>
                        <th>CPF</th>
                        <th>Telefone</th>
                        <th>Endereço</th>
                        <th class="text-center">Ações</th>
                    </tr>
                </thead>
                <tbody id="tabelaClientes">
                    <tr>
                        <td colspan="5" class="text-center text-muted py-4">
                            <i class="bi bi-hourglass-split me-2"></i>Carregando clientes...
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>

    </div>
</div>

<!-- Modal de Editar -->
<div class="modal fade" id="modalEditar" tabindex="-1">
    <div class="modal-dialog">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title"><i class="bi bi-pencil-square me-2"></i>Editar Cliente</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body">
                <form id="formEditar">

                    <!-- CPF é a chave: exibir mas não editar -->
                    <div class="mb-3">
                        <label class="form-label fw-semibold">CPF <span class="text-muted small">(não editável)</span></label>
                        <input type="text" id="editCpf" class="form-control bg-light" readonly>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Nome</label>
                        <input type="text" id="editNome" class="form-control" required>
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Telefone</label>
                        <input type="text" id="editTelefone" class="form-control" required placeholder="Somente números">
                    </div>

                    <div class="mb-3">
                        <label class="form-label fw-semibold">Endereço</label>
                        <input type="text" id="editEndereco" class="form-control" required>
                    </div>

                    <div id="mensagemEditar" class="mb-2"></div>

                    <div class="d-flex gap-2">
                        <button type="button" class="btn btn-outline-secondary w-50" data-bs-dismiss="modal">Cancelar</button>
                        <button type="submit" class="btn btn-warning w-50">
                            <i class="bi bi-check-circle me-1"></i>Salvar
                        </button>
                    </div>

                </form>
            </div>
        </div>
    </div>
</div>

<!-- Modal de Confirmar Exclusão -->
<div class="modal fade" id="modalExcluir" tabindex="-1">
    <div class="modal-dialog modal-sm">
        <div class="modal-content">
            <div class="modal-header bg-danger text-white">
                <h5 class="modal-title"><i class="bi bi-exclamation-triangle me-2"></i>Excluir</h5>
                <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
            </div>
            <div class="modal-body text-center">
                <p class="mb-1">Tem certeza que deseja excluir o cliente:</p>
                <strong id="nomeExcluir" class="d-block mb-1 text-danger"></strong>
                <span class="text-muted small" id="cpfExcluir"></span>
                <p class="mt-2 text-muted small">Essa ação não pode ser desfeita.</p>
            </div>
            <div class="modal-footer d-flex gap-2">
                <button type="button" class="btn btn-outline-secondary w-50" data-bs-dismiss="modal">Cancelar</button>
                <button type="button" class="btn btn-danger w-50" id="btnConfirmarExclusao">
                    <i class="bi bi-trash me-1"></i>Excluir
                </button>
            </div>
        </div>
    </div>
</div>

<footer class="bg-dark text-light text-center mt-auto">
    <div class="container py-3">
        <small>© 2026 Distribuidora Rocha</small>
    </div>
</footer>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../static/PesquisarCliente.js"></script>
</body>
</html>
