<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Editar Cliente</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="bg-light d-flex flex-column min-vh-100">
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container">
           <a href="index.html" class="navbar-brand">
    Distribuidora Rocha
</a>

        <div>
            <a href="CadastrarCliente.html" class="btn btn-outline-light btn-sm">Cadastrar</a>
            <a href="PesquisarCliente.html" class="btn btn-outline-light btn-sm">Pesquisar</a>
                <a href="EditarCliente.html" class="btn btn-outline-light btn-sm">Editar</a>
            <a href="ExcluirCliente.html" class="btn btn-outline-light btn-sm">Excluir</a>
        </div>
    </div>
</nav>
<div class="container mt-5">
    <div class="card shadow p-4">

        <h4 class="mb-3">Editar Cliente</h4>

<!-- Buscar por ID -->

<div class="input-group mb-3">
    <input type="number" id="idBusca" class="form-control" placeholder="Digite o ID do cliente">
    <button class="btn btn-primary" onclick="buscar()">Buscar</button>
</div>
<div id="formContainer" style="display: none;">
        <form id="form">
            <input type="text" id="nome" class="form-control mb-2" placeholder="Nome">
            <input type="text" id="cpf" class="form-control mb-2" placeholder="CPF">
            <input type="text" id="telefone" class="form-control mb-2" placeholder="Telefone">
            <input type="text" id="endereco" class="form-control mb-3" placeholder="Endereço">

            <button type="submit" class="btn btn-warning w-100">
                Salvar alterações
            </button>

        </form>
    </div>
        <div id="msg" class="mt-3"></div>

    </div>
</div>
 <!-- Rodapé -->
<footer class="bg-dark text-light text-center mt-auto">
    <div class="container py-3">
        <small>© 2026 Distribuidora Rocha</small>
    </div>
</footer>
<!-- JS separado -->
<script src="../static/EditarCliente.js"></script>
